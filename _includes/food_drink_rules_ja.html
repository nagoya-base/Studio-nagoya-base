<!-- 飲食・アルコールのルール（緊縛・メンズ共通） -->
<div class="food-rules">
  <div class="food-rule food-rule--ok">
    <p class="food-rule-label">✅ 可能</p>
    <ul>
      <li>飲食物の持ち込み</li>
      <li>ちゃぶ台・学校机周辺での飲食</li>
      <li>アルコール類の持ち込み</li>
    </ul>
  </div>
  <div class="food-rule food-rule--ng">
    <p class="food-rule-label">🚫 禁止</p>
    <ul>
      <li>畳スペース・吊り床周辺での飲食</li>
      <li>宴会・飲み会目的での利用</li>
      <li>ゴミの放置（持ち帰りをお願いします）</li>
    </ul>
  </div>
</div>
<p class="food-note">飲食物のこぼれ・汚損・臭気残りが確認された場合は、清掃費用または修繕費用の実費をご請求する場合があります。</p>
