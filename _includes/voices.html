<section id="voices" class="bg-section">
  <div class="container">
    <h2 class="section-title">ご利用者の声</h2>
    <p class="section-subtitle">Voices</p>
    <p class="voices-intro">実際にスタジオを利用した方から寄せられた感想です。実際のレビューより掲載しています。</p>
    <div class="voices-grid">
      {% for voice in site.data.voices_ja %}
      <blockquote class="voice-card">
        {% if voice.title %}<p class="voice-title">{{ voice.title }}</p>{% endif %}
        <p class="voice-text">{{ voice.text }}</p>
        {% if voice.usage %}<footer class="voice-meta"><span class="voice-usage">利用目的：{{ voice.usage }}</span></footer>{% elsif voice.attribution %}<footer class="voice-meta">{{ voice.attribution }}</footer>{% endif %}
      </blockquote>
      {% endfor %}
    </div>
  </div>
</section>
