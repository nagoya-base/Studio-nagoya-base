name: X 自動投稿

on:
  schedule:
    # JST 9:00 (UTC 0:00)
    - cron: "0 0 * * *"
    # JST 13:00 (UTC 4:00)
    - cron: "0 4 * * *"
    # JST 19:00 (UTC 10:00)
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = no actual post)"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit post_log.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push the log update
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Run poster
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python bot/x_poster.py --dry-run
          else
            python bot/x_poster.py
          fi

      - name: Commit post log
        # Only commit when a real post was made (log file changed)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bot/post_log.json
          if git diff --cached --quiet; then
            echo "No changes to post_log.json — skipping commit."
          else
            git commit -m "chore: update post_log.json [skip ci]"
            git push
          fi
