<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アタル｜名古屋・ポートレート＆ロープセッション</title>
  <meta name="description" content="名古屋で活動するアタルの個人セッション。ユニフォーム撮影・ポートレート・ロープ体験まで幅広く対応。初心者歓迎、完全貸切、丁寧な進行。">
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080d17;
      --bg-card:     #0f1724;
      --bg-card2:    #162035;
      --accent:      #5b8fd4;
      --accent-lt:   #7baae0;
      --gold:        #c8a030;
      --text:        #e4e8f0;
      --text-muted:  #7a8ba8;
      --border:      #1c2a3f;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Meiryo', sans-serif;
      font-size: 15px;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent-lt); text-decoration: none; }
    a:hover { color: #fff; }

    /* ── Layout ── */
    .container { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
    section { padding: 5rem 0; }
    section + section { border-top: 1px solid var(--border); }

    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 0.65rem;
    }
    h2 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
    }
    h3 {
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 0;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8, 13, 23, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand { font-size: 0.88rem; font-weight: 800; letter-spacing: 0.12em; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { font-size: 0.78rem; letter-spacing: 0.04em; color: var(--text-muted); transition: color 0.15s; }
    .nav-links a:hover { color: var(--text); }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: 0.85rem 1.9rem;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      transition: all 0.18s;
      cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-lt); color: #fff; transform: translateY(-1px); }
    .btn-outline { border: 1px solid var(--border); color: var(--text-muted); margin-left: 0.8rem; }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent-lt); }
    .btn-lg { padding: 1.1rem 2.75rem; font-size: 1rem; }

    /* ── Hero ── */
    .hero { padding: 7rem 0 6rem; border-bottom: 1px solid var(--border); }
    .hero-tag {
      display: inline-block;
      background: rgba(91, 143, 212, 0.1);
      border: 1px solid rgba(91, 143, 212, 0.28);
      color: var(--accent-lt);
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      padding: 0.3rem 1rem;
      border-radius: 2px;
      margin-bottom: 2rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 5.5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.25;
      margin-bottom: 1.4rem;
    }
    .hero h1 em { font-style: normal; color: var(--accent-lt); }
    .hero-sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 480px;
      line-height: 1.95;
      margin-bottom: 2.75rem;
    }

    /* ── Values ── */
    .values-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      margin-top: 2.25rem;
    }
    .value-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.75rem 1.5rem;
    }
    .value-num {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--accent);
      opacity: 0.4;
      line-height: 1;
      margin-bottom: 0.85rem;
    }
    .value-title { font-size: 0.93rem; font-weight: 700; margin-bottom: 0.5rem; }
    .value-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.75; }

    /* ── Features ── */
    .features-list { list-style: none; display: grid; gap: 0.9rem; margin-top: 2rem; }
    .features-list li {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.2rem 1.5rem;
    }
    .feat-icon { font-size: 1.15rem; flex-shrink: 0; margin-top: 0.1rem; }
    .feat-text strong { display: block; font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; }
    .feat-text span { font-size: 0.82rem; color: var(--text-muted); }

    /* ── Session tags ── */
    .session-lead { font-size: 0.88rem; color: var(--text-muted); line-height: 1.9; margin-bottom: 1.25rem; }
    .session-tags { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1.5rem; }
    .session-tag {
      background: rgba(91, 143, 212, 0.09);
      border: 1px solid rgba(91, 143, 212, 0.22);
      color: var(--accent-lt);
      font-size: 0.82rem;
      padding: 0.35rem 0.9rem;
      border-radius: 3px;
    }
    .session-note {
      padding: 1.25rem 1.5rem;
      background: var(--bg-card2);
      border-left: 3px solid var(--accent);
      border-radius: 0 4px 4px 0;
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.85;
    }

    /* ── Pricing ── */
    .pricing-plans { display: grid; gap: 1.25rem; margin-top: 2rem; }
    .plan-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .plan-card.featured { border-color: rgba(91, 143, 212, 0.5); }
    .plan-header {
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .plan-name { font-size: 0.95rem; font-weight: 700; }
    .plan-badge {
      font-size: 0.68rem;
      background: rgba(200, 160, 48, 0.12);
      color: var(--gold);
      border: 1px solid rgba(200, 160, 48, 0.28);
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }
    .plan-body { padding: 1.5rem; }
    .plan-desc { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.25rem; }
    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .price-row:last-of-type { border-bottom: none; }
    .price-label { color: var(--text-muted); }
    .price-value { font-weight: 800; font-size: 1rem; }

    /* ── Options ── */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
    .option-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
    }
    .option-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.4rem; }
    .option-price { font-size: 1.1rem; font-weight: 800; color: var(--accent-lt); }
    .option-note { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.3rem; }

    /* ── Rental table ── */
    .rental-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; font-size: 0.88rem; }
    .rental-table th {
      text-align: left;
      padding: 0.7rem 1rem;
      background: var(--bg-card2);
      color: var(--text-muted);
      font-weight: 700;
      border: 1px solid var(--border);
      font-size: 0.76rem;
      letter-spacing: 0.06em;
    }
    .rental-table td { padding: 0.7rem 1rem; border: 1px solid var(--border); }
    .rental-notes { margin-top: 0.7rem; font-size: 0.8rem; color: var(--text-muted); }
    .rental-notes li { margin-left: 1.2rem; margin-bottom: 0.2rem; }

    /* ── Schedule ── */
    .schedule-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.75rem 2rem;
      margin-top: 1.75rem;
    }
    .schedule-row {
      display: flex;
      gap: 1.5rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }
    .schedule-row:last-of-type { border-bottom: none; }
    .schedule-day {
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent);
      min-width: 64px;
      padding-top: 0.15rem;
      text-transform: uppercase;
    }
    .schedule-time { font-size: 0.88rem; }
    .schedule-time small { font-size: 0.78rem; color: var(--text-muted); }

    /* ── Testimonials ── */
    .testimonial-grid { display: grid; gap: 1rem; margin-top: 2rem; }
    .testimonial {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem 1.75rem 1.5rem 2rem;
      position: relative;
    }
    .testimonial::before {
      content: '\201C';
      position: absolute;
      top: 0.6rem;
      left: 1rem;
      font-size: 3rem;
      line-height: 1;
      color: var(--accent);
      opacity: 0.18;
      font-family: Georgia, serif;
    }
    .testimonial--summary::before { content: ''; }
    .testimonial--summary strong { color: var(--text); }
    .testimonial-text { font-size: 0.9rem; line-height: 1.88; }

    /* ── Notice ── */
    .notice-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.75rem 2rem;
      margin-top: 2rem;
    }
    .notice-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 0.9rem; }
    .notice-list { list-style: none; display: grid; gap: 0.45rem; }
    .notice-list li {
      font-size: 0.85rem;
      color: var(--text-muted);
      padding-left: 1.1rem;
      position: relative;
    }
    .notice-list li::before { content: '—'; position: absolute; left: 0; color: var(--border); }
    .ng-badge {
      display: inline-block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #f87171;
      font-size: 0.7rem;
      padding: 0.15rem 0.55rem;
      border-radius: 2px;
      letter-spacing: 0.05em;
      font-weight: 700;
      margin-left: 0.4rem;
    }

    /* ── Contact ── */
    .contact-wrap { text-align: center; }
    .contact-wrap h2 { text-align: center; }
    .contact-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto 2.5rem;
      line-height: 1.95;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 3rem 0;
    }
    .footer-brand { font-size: 0.88rem; font-weight: 800; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
    .footer-note { font-size: 0.78rem; color: var(--text-muted); line-height: 1.7; max-width: 340px; }
    .footer-copy { font-size: 0.74rem; color: var(--text-muted); margin-top: 1.75rem; }

    /* ── Hamburger ── */
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.4rem;
      flex-direction: column;
      gap: 5px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.25s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Photo features ── */
    .plan-intro {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
      line-height: 1.85;
    }
    .photo-features {
      list-style: none;
      margin-top: 1.5rem;
      display: grid;
      gap: 0.5rem;
    }
    .photo-features li {
      font-size: 0.85rem;
      color: var(--text-muted);
      padding-left: 1.2rem;
      position: relative;
    }
    .photo-features li::before { content: '✓'; position: absolute; left: 0; color: var(--accent); }
    .photo-gallery-mini { grid-template-columns: repeat(2, 1fr); }
    .gallery-mini-lg { grid-template-columns: repeat(3, 1fr); }

    /* ── Gallery ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
      margin-top: 1.75rem;
    }
    .gallery-mini {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin-top: 0.75rem;
    }
    .gallery-mini-label {
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 1.75rem;
      margin-bottom: 0;
    }
    .gallery-item {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 4px;
      cursor: pointer;
      background: var(--bg-card2);
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s, opacity 0.2s;
    }
    .gallery-item:hover img { transform: scale(1.05); opacity: 0.8; }

    /* ── Modal ── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal.open { display: flex; }
    .modal-img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
    }
    .modal-close {
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: #fff;
      font-size: 2.25rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.6;
    }
    .modal-close:hover { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      section { padding: 3.5rem 0; }
      .hero { padding: 5rem 0 4rem; }
      .values-grid { grid-template-columns: 1fr; gap: 1rem; }
      .options-grid { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .gallery-mini { grid-template-columns: repeat(2, 1fr); }
      .gallery-mini-lg { grid-template-columns: repeat(2, 1fr); }
      .btn-outline { margin-left: 0; margin-top: 0.75rem; display: block; text-align: center; }
      .rental-table { font-size: 0.8rem; }
      .rental-table th, .rental-table td { padding: 0.55rem 0.75rem; }
      .schedule-box { padding: 1.25rem; }
      /* hamburger */
      .hamburger { display: flex; }
      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(8, 13, 23, 0.97);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        flex-direction: column;
        padding: 0.5rem 1.5rem;
        gap: 0;
      }
      .nav-links.open { display: flex; }
      .nav-links li { border-bottom: 1px solid var(--border); }
      .nav-links li:last-child { border-bottom: none; }
      .nav-links a { padding: 0.85rem 0; font-size: 0.92rem; display: block; }
    }
  <script>
  (function () {
    if (!sessionStorage.getItem('ataru_age_verified')) {
      location.replace('./');
    }
  })();
</script>
</head>
<body>

<!-- ── Navigation ── -->
<nav>
  <span class="nav-brand">ATARU</span>
  <ul class="nav-links">
    <li><a href="#features">特徴</a></li>
    <li><a href="#photo">作品撮り</a></li>
    <li><a href="#session">セッション</a></li>
    <li><a href="#pricing">料金</a></li>
    <li><a href="#schedule">日程・場所</a></li>
    <li><a href="#contact">予約</a></li>
  </ul>
  <button class="hamburger" aria-label="メニューを開く" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ── Hero ── -->
<section class="hero" id="top">
  <div class="container">
    <div class="hero-tag">名古屋・上前津エリア ／ ポートレート＆ロープセッション</div>
    <h1>ユニフォームとロープで作る、<br><em>あなただけの一枚。</em></h1>
    <p class="hero-sub">
      アタルによる完全マンツーマン個人セッション。<br>
      「ロープを体験してみたい」「撮影だけしたい」どちらのご要望にも対応します。<br>
      初心者の方も、まずはお気軽にご相談ください。
    </p>
    <a href="#contact" class="btn btn-primary">予約・相談する</a>
    <a href="#pricing" class="btn btn-outline">料金を見る</a>
    <div class="options-grid" style="margin-top: 2.5rem;">
      <div class="option-card">
        <div class="option-title">📸 作品撮りコース</div>
        <p class="option-note" style="margin-top: 0.4rem;">ポートレート・コスプレ・ユニフォームを本格的な一枚に。撮影が目的の方へ。</p>
        <a href="#photo" class="btn btn-outline" style="margin-top: 0.75rem; display: inline-block; font-size: 0.82rem; padding: 0.55rem 1.1rem;">詳しくはこちら →</a>
      </div>
      <div class="option-card">
        <div class="option-title">🪢 ロープセッション</div>
        <p class="option-note" style="margin-top: 0.4rem;">体験・緊縛・感覚を楽しみたい方へ。撮影なしでも参加できます。</p>
        <a href="#pricing" class="btn btn-outline" style="margin-top: 0.75rem; display: inline-block; font-size: 0.82rem; padding: 0.55rem 1.1rem;">詳しくはこちら →</a>
      </div>
    </div>
  </div>
</section>

<!-- ── 3 Values ── -->
<section id="about">
  <div class="container">
    <p class="section-label">Philosophy</p>
    <h2>3つのこだわり</h2>
    <div style="margin-bottom: 2rem; border-radius: 8px; overflow: hidden; max-height: 420px;">
      <img src="images/IMG_3771.jpeg" alt="アタル｜ロープと向き合う" style="width: 100%; height: 100%; object-fit: cover; object-position: center 20%; display: block;">
    </div>
    <div class="values-grid">
      <div class="value-card">
        <div class="value-num">01</div>
        <div class="value-title">見映えの良さ</div>
        <p class="value-desc">体格を美しく引き立てる縄のデザインを重視。後から見返したとき、納得できる仕上がりを目指します。</p>
      </div>
      <div class="value-card">
        <div class="value-num">02</div>
        <div class="value-title">安全性</div>
        <p class="value-desc">縛りの強さ・時間・体調を都度確認しながら進めます。「痛い」「しんどい」はいつでも言ってください。</p>
      </div>
      <div class="value-card">
        <div class="value-num">03</div>
        <div class="value-title">落ち着いた進行</div>
        <p class="value-desc">急かさず、押しつけず。あなたのペースに合わせてゆっくり進めます。</p>
      </div>
    </div>
  </div>
</section>

<!-- ── Features ── -->
<section id="features">
  <div class="container">
    <p class="section-label">Features</p>
    <h2>アタルの特徴</h2>
    <ul class="features-list">
      <li>
        <span class="feat-icon">🤝</span>
        <div class="feat-text">
          <strong>丁寧で安心できる進行</strong>
          <span>初めての方が不安なく楽しめるよう、流れの説明から丁寧に対応します。</span>
        </div>
      </li>
      <li>
        <span class="feat-icon">😌</span>
        <div class="feat-text">
          <strong>初心者でもリラックスしやすい柔らかい雰囲気</strong>
          <span>緊張しやすい方も、自然とほぐれていただける雰囲気づくりを意識しています。</span>
        </div>
      </li>
      <li>
        <span class="feat-icon">🎨</span>

<script>
  function openModal(src) {
    document.getElementById('modal-img').src = src;
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  const hamburger = document.querySelector('.hamburger');
  const navLinks = document.querySelector('.nav-links');
  hamburger.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('open');
    hamburger.classList.toggle('open');
    hamburger.setAttribute('aria-expanded', isOpen);
  });
  document.querySelectorAll('.nav-links a').forEach(a =>
    a.addEventListener('click', () => {
      navLinks.classList.remove('open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
    })
  );
</script>
